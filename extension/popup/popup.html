<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Smallest AI Key</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(29, 155, 240, 0.22), transparent 55%),
          radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.9), #000);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ttp-popup-root {
        width: min(540px, 100% - 40px);
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(15, 23, 42, 0.78);
        padding: 22px 24px 18px;
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(26px);
        -webkit-backdrop-filter: blur(26px);
      }

      .ttp-popup-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .ttp-icon-pill {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.4);
        font-size: 13px;
      }

      .ttp-popup-title {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .ttp-popup-subtitle {
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 14px;
        max-width: 420px;
      }

      .ttp-popup-subtitle a {
        color: #67e8f9;
        text-decoration: none;
      }

      .ttp-popup-subtitle a:hover {
        text-decoration: underline;
      }

      .ttp-field-label {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 6px;
      }

      .ttp-input-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .ttp-input {
        flex: 1;
        font-size: 14px;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(15, 23, 42, 0.92);
        color: #e5e7eb;
        outline: none;
      }

      .ttp-input::placeholder {
        color: #9ca3af;
        font-size: 13px;
      }

      .ttp-input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
      }

      .ttp-save-btn {
        border: none;
        border-radius: 999px;
        background: linear-gradient(135deg, #1d9bf0, #38bdf8);
        color: #0b1120;
        padding: 8px 14px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }

      .ttp-save-btn:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .ttp-status {
        margin-top: 10px;
        font-size: 10px;
        color: #9ca3af;
        min-height: 14px;
      }

      .ttp-status--error {
        color: #f97373;
      }

      .ttp-status--ok {
        color: #bbf7d0;
      }

      .ttp-footer {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        color: #6b7280;
      }

      .ttp-footer a {
        color: #9ca3af;
        text-decoration: none;
      }

      .ttp-footer a:hover {
        text-decoration: underline;
      }

      .ttp-popup-root {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 160ms ease-out, transform 160ms ease-out;
      }

      .ttp-popup-root.is-closing {
        opacity: 0;
        transform: translateY(6px);
      }
    </style>
  </head>
  <body>
    <div class="ttp-popup-root" id="ttp-popup-root">
      <div class="ttp-popup-header">
        <div class="ttp-icon-pill">🔊</div>
        <div class="ttp-popup-title">Enable audio with Smallest AI</div>
      </div>
      <div class="ttp-popup-subtitle">
        Paste your Smallest AI API key from
        <a href="https://app.smallest.ai/" target="_blank" rel="noreferrer">app.smallest.ai</a>.
      </div>

      <div class="ttp-field-group">
        <div class="ttp-field-label">API key</div>
        <div class="ttp-input-row">
          <input
            id="ttp-api-key-input"
            type="password"
            class="ttp-input"
            placeholder="sk-..."
            autocomplete="off"
          />
          <button id="ttp-save-btn" class="ttp-save-btn">Save</button>
        </div>
      </div>

      <div id="ttp-status" class="ttp-status"></div>

      <div class="ttp-footer">
        <span id="ttp-key-state"></span>
        <a href="https://smallest.ai" target="_blank" rel="noreferrer">Smallest AI</a>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
